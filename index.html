<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - Championnat de Clôture</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #7f1d1d; min-height: 100vh; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { font-size: 17px; font-weight: bold; }
        h2 { font-size: 15px; font-weight: bold; margin-bottom: 10px; }
        h3 { font-size: 13px; font-weight: bold; margin-bottom: 6px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; color: #374151; }
        input, select { width: 100%; padding: 10px; border: 2px solid #d1d5db; border-radius: 8px; font-size: 14px; margin-bottom: 10px; background: white; -webkit-appearance: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        .btn-green { background: #16a34a; color: white; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-red { background: #dc2626; color: white; }
        .btn-orange { background: #ea580c; color: white; }
        .btn-small { width: auto; padding: 8px 14px; font-size: 13px; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .score-input { text-align: center; font-size: 22px; font-weight: bold; }
        .tag { display: inline-block; background: #dbeafe; color: #1e40af; padding: 3px 8px; border-radius: 20px; font-size: 11px; margin: 2px; }
        .goal-item { background: #f9fafb; border-radius: 6px; padding: 6px 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .goal-item button { background: none; border: none; cursor: pointer; font-size: 14px; padding: 0 4px; }
        .box-red { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px; }
        .box-blue { background: #eff6ff; border: 1px solid #93c5fd; border-radius: 8px; padding: 10px; }
        .box-green { background: #f0fdf4; border: 2px solid #86efac; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .header { display: flex; align-items: center; gap: 8px; }
        .dot-red { width: 26px; height: 26px; background: #dc2626; border-radius: 50%; flex-shrink: 0; }
        .dot-blue { width: 26px; height: 26px; background: #2563eb; border-radius: 50%; flex-shrink: 0; }
        .players-box { background: #f9fafb; border-radius: 8px; padding: 8px; max-height: 90px; overflow-y: auto; margin-bottom: 6px; }
        .match-list { max-height: 200px; overflow-y: auto; }
        .match-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #e5e7eb; font-size: 13px; }
        .match-item:last-child { border-bottom: none; }
        .badge-done { background: #d1fae5; color: #065f46; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .badge-todo { background: #fef9c3; color: #713f12; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .status { font-size: 11px; color: #6b7280; margin-top: 2px; }
        .separator { border: none; border-top: 2px solid #e5e7eb; margin: 10px 0; }
        select option { font-size: 14px; padding: 6px; }
    </style>
</head>
<body>
<div style="max-width:600px; margin:0 auto;">

    <!-- HEADER -->
    <div class="card">
        <div class="header">
            <div class="dot-red"></div>
            <div class="dot-blue"></div>
            <div>
                <h1>🔒 ADMIN - Championnat de Clôture</h1>
                <p class="status" id="fbStatus">🔄 Connexion...</p>
            </div>
        </div>
    </div>

    <!-- JOUEURS -->
    <div class="card">
        <h2>👥 Joueurs</h2>
        <div style="display:flex; gap:8px;">
            <input type="text" id="newPlayer" placeholder="Nom du joueur" style="margin:0; flex:1;" onkeypress="if(event.key==='Enter')addPlayer()">
            <button class="btn btn-green btn-small" onclick="addPlayer()">➕ Ajouter</button>
        </div>
        <div style="height:8px;"></div>
        <div class="players-box">
            <div id="playersList"><p style="color:#9ca3af;font-size:12px;">Aucun joueur enregistré</p></div>
        </div>
    </div>

    <!-- AJOUTER UNE JOURNÉE -->
    <div class="card">
        <h2>➕ Ajouter une journée</h2>
        <div class="box-green">
            <label>📅 Date du match :</label>
            <input type="date" id="newMatchDate">
            <button class="btn btn-orange" onclick="addNewMatch()" style="margin:0;">➕ Créer cette journée</button>
        </div>

        <!-- LISTE DES JOURNÉES -->
        <h3>📋 Journées créées (<span id="matchCount">0</span>)</h3>
        <div class="match-list" id="matchList">
            <p style="color:#9ca3af; font-size:12px; text-align:center; padding:10px;">Aucune journée créée</p>
        </div>
    </div>

    <!-- SAISIR UN RÉSULTAT -->
    <div class="card">
        <h2>⚽ Saisir un résultat</h2>
        <label>Sélectionner une journée :</label>
        <select id="matchSelect" onchange="selectMatch()">
            <option value="">-- Choisir une journée --</option>
        </select>

        <div id="matchForm" style="display:none;">
            <hr class="separator">

            <!-- SCORES -->
            <div class="grid2">
                <div class="box-red">
                    <label style="color:#dc2626; text-align:center;">🔴 Rouges</label>
                    <input type="number" min="0" id="scoreRouges" class="score-input" placeholder="0" style="margin:0;">
                </div>
                <div class="box-blue">
                    <label style="color:#2563eb; text-align:center;">🔵 Bleus</label>
                    <input type="number" min="0" id="scoreBleus" class="score-input" placeholder="0" style="margin:0;">
                </div>
            </div>

            <hr class="separator">

            <!-- AJOUTER UN BUT -->
            <h3>⚽ Ajouter un but</h3>
            <label>Équipe :</label>
            <select id="goalTeam">
                <option value="rouges">🔴 Rouges</option>
                <option value="bleus">🔵 Bleus</option>
            </select>
            <label>Buteur :</label>
            <select id="goalScorer">
                <option value="">-- Choisir le buteur --</option>
            </select>
            <label>Passeur (optionnel) :</label>
            <select id="goalAssist">
                <option value="">-- Choisir le passeur --</option>
            </select>
            <button class="btn btn-blue" onclick="addGoal()">➕ Ajouter ce but</button>

            <!-- BUTS ENREGISTRÉS -->
            <div class="grid2">
                <div class="box-red">
                    <h3 style="color:#dc2626;">🔴 Buts Rouges (<span id="countR">0</span>)</h3>
                    <div id="goalsR"><p style="color:#9ca3af;font-size:11px;text-align:center;">Aucun but</p></div>
                </div>
                <div class="box-blue">
                    <h3 style="color:#2563eb;">🔵 Buts Bleus (<span id="countB">0</span>)</h3>
                    <div id="goalsB"><p style="color:#9ca3af;font-size:11px;text-align:center;">Aucun but</p></div>
                </div>
            </div>

            <hr class="separator">
            <button class="btn btn-green" id="saveBtn" onclick="saveMatch()">✅ Enregistrer le Match</button>
        </div>
    </div>

    <!-- ZONE DANGER -->
    <div class="card">
        <h3 style="color:#dc2626; margin-bottom:8px;">⚠️ Zone Danger</h3>
        <button class="btn btn-red btn-small" onclick="resetAll()">🗑️ Réinitialiser toutes les données</button>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
    // === FIREBASE ===
    const firebaseConfig = {
        apiKey: "AIzaSyD26jNyvIzWYNwfS97N27iZES-AFWVtIGc",
        authDomain: "championnat-football.firebaseapp.com",
        projectId: "championnat-football",
        storageBucket: "championnat-football.firebasestorage.app",
        messagingSenderId: "271329092716",
        appId: "1:271329092716:web:68e7ff9e0527f489c36449"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // === DONNÉES ===
    let players = [];
    let matches = [];
    let scorers = {};
    let assists = {};
    let goalsR = [];
    let goalsB = [];
    let selectedJournee = null;

    // === FIREBASE LISTENERS ===
    db.collection('cloture').doc('matches').onSnapshot(doc => {
        matches = doc.exists && doc.data().data ? doc.data().data : [];
        renderMatchList();
        buildMatchSelect();
        document.getElementById('fbStatus').textContent = '✅ Connecté';
    }, () => document.getElementById('fbStatus').textContent = '⚠️ Hors-ligne');

    db.collection('cloture').doc('players').onSnapshot(doc => {
        players = doc.exists && doc.data().data ? doc.data().data : [];
        renderPlayers();
        buildPlayerSelects();
    });

    db.collection('cloture').doc('scorers').onSnapshot(doc => {
        scorers = doc.exists && doc.data().data ? doc.data().data : {};
    });

    db.collection('cloture').doc('assists').onSnapshot(doc => {
        assists = doc.exists && doc.data().data ? doc.data().data : {};
    });

    // === JOUEURS ===
    function addPlayer() {
        const name = document.getElementById('newPlayer').value.trim();
        if (!name) { alert('Entrez un nom'); return; }
        if (players.includes(name)) { alert('Joueur déjà existant !'); return; }
        players = [...players, name].sort();
        db.collection('cloture').doc('players').set({ data: players });
        document.getElementById('newPlayer').value = '';
    }

    function renderPlayers() {
        const div = document.getElementById('playersList');
        div.innerHTML = players.length === 0
            ? '<p style="color:#9ca3af;font-size:12px;">Aucun joueur enregistré</p>'
            : players.map(p => `<span class="tag">${p}</span>`).join('');
    }

    function buildPlayerSelects() {
        const opts = players.map(p => `<option value="${p}">${p}</option>`).join('');
        document.getElementById('goalScorer').innerHTML = '<option value="">-- Choisir le buteur --</option>' + opts;
        document.getElementById('goalAssist').innerHTML = '<option value="">-- Choisir le passeur --</option>' + opts;
    }

    // === JOURNÉES ===
    function addNewMatch() {
        const date = document.getElementById('newMatchDate').value;
        if (!date) { alert('Choisissez une date'); return; }

        // Vérifier si la date existe déjà
        if (matches.find(m => m.date === date)) { alert('Cette date existe déjà !'); return; }

        const newMatch = {
            journee: matches.length + 1,
            date: date,
            scoreRouges: null,
            scoreBleus: null,
            goalsRouges: [],
            goalsBleus: []
        };

        matches.push(newMatch);
        // Trier par date
        matches.sort((a, b) => a.date.localeCompare(b.date));
        // Renuméroter
        matches.forEach((m, i) => m.journee = i + 1);

        db.collection('cloture').doc('matches').set({ data: matches });
        document.getElementById('newMatchDate').value = '';
        alert('✅ Journée J' + newMatch.journee + ' créée !');
    }

    function renderMatchList() {
        const div = document.getElementById('matchList');
        document.getElementById('matchCount').textContent = matches.length;
        if (matches.length === 0) {
            div.innerHTML = '<p style="color:#9ca3af;font-size:12px;text-align:center;padding:10px;">Aucune journée créée</p>';
            return;
        }
        div.innerHTML = matches.map(m => {
            const d = new Date(m.date + 'T12:00:00');
            const dateStr = d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
            const badge = m.scoreRouges !== null
                ? `<span class="badge-done">${m.scoreRouges}-${m.scoreBleus}</span>`
                : `<span class="badge-todo">À jouer</span>`;
            return `<div class="match-item"><span><strong>J${m.journee}</strong> • ${dateStr}</span>${badge}</div>`;
        }).join('');
    }

    function buildMatchSelect() {
        const sel = document.getElementById('matchSelect');
        const current = sel.value;
        sel.innerHTML = '<option value="">-- Choisir une journée --</option>';
        matches.forEach(m => {
            const d = new Date(m.date + 'T12:00:00');
            const dateStr = d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            const status = m.scoreRouges !== null ? ` ✅ (${m.scoreRouges}-${m.scoreBleus})` : ' ⏳ À jouer';
            const opt = document.createElement('option');
            opt.value = m.journee;
            opt.textContent = `J${m.journee} • ${dateStr}${status}`;
            sel.appendChild(opt);
        });
        if (current) sel.value = current;
    }

    // === SÉLECTIONNER UN MATCH ===
    function selectMatch() {
        const val = document.getElementById('matchSelect').value;
        if (!val) { document.getElementById('matchForm').style.display = 'none'; return; }
        selectedJournee = parseInt(val);
        const match = matches.find(m => m.journee === selectedJournee);
        if (!match) return;

        document.getElementById('matchForm').style.display = 'block';
        document.getElementById('scoreRouges').value = match.scoreRouges !== null ? match.scoreRouges : '';
        document.getElementById('scoreBleus').value = match.scoreBleus !== null ? match.scoreBleus : '';
        goalsR = match.goalsRouges ? [...match.goalsRouges] : [];
        goalsB = match.goalsBleus ? [...match.goalsBleus] : [];
        renderGoals();
    }

    // === BUTS ===
    function addGoal() {
        const scorer = document.getElementById('goalScorer').value;
        const assist = document.getElementById('goalAssist').value || 'Aucune';
        const team = document.getElementById('goalTeam').value;
        if (!scorer) { alert('Sélectionnez un buteur'); return; }
        if (team === 'rouges') goalsR.push({ scorer, assist });
        else goalsB.push({ scorer, assist });
        document.getElementById('goalScorer').value = '';
        document.getElementById('goalAssist').value = '';
        renderGoals();
    }

    function removeGoal(team, idx) {
        if (team === 'r') goalsR.splice(idx, 1);
        else goalsB.splice(idx, 1);
        renderGoals();
    }

    function renderGoals() {
        document.getElementById('countR').textContent = goalsR.length;
        document.getElementById('countB').textContent = goalsB.length;
        document.getElementById('goalsR').innerHTML = goalsR.length === 0
            ? '<p style="color:#9ca3af;font-size:11px;text-align:center;">Aucun but</p>'
            : goalsR.map((g, i) => `<div class="goal-item"><div><div>⚽ <strong>${g.scorer}</strong></div>${g.assist !== 'Aucune' ? `<div style="color:#6b7280;font-size:11px;">🎯 ${g.assist}</div>` : ''}</div><button onclick="removeGoal('r',${i})">❌</button></div>`).join('');
        document.getElementById('goalsB').innerHTML = goalsB.length === 0
            ? '<p style="color:#9ca3af;font-size:11px;text-align:center;">Aucun but</p>'
            : goalsB.map((g, i) => `<div class="goal-item"><div><div>⚽ <strong>${g.scorer}</strong></div>${g.assist !== 'Aucune' ? `<div style="color:#6b7280;font-size:11px;">🎯 ${g.assist}</div>` : ''}</div><button onclick="removeGoal('b',${i})">❌</button></div>`).join('');
    }

    // === SAUVEGARDER MATCH ===
    function saveMatch() {
        const sR = document.getElementById('scoreRouges').value;
        const sB = document.getElementById('scoreBleus').value;
        if (!selectedJournee || sR === '' || sB === '') { alert('⚠️ Remplissez les scores'); return; }
        if (parseInt(sR) !== goalsR.length || parseInt(sB) !== goalsB.length) {
            alert(`⚠️ Buts incorrects !\nRouges: ${goalsR.length} buts saisis / score ${sR}\nBleus: ${goalsB.length} buts saisis / score ${sB}`);
            return;
        }
        const idx = matches.findIndex(m => m.journee === selectedJournee);
        matches[idx] = { ...matches[idx], scoreRouges: parseInt(sR), scoreBleus: parseInt(sB), goalsRouges: [...goalsR], goalsBleus: [...goalsB] };

        // Stats
        const newScorers = { ...scorers };
        const newAssists = { ...assists };
        [...goalsR, ...goalsB].forEach(g => {
            newScorers[g.scorer] = (newScorers[g.scorer] || 0) + 1;
            if (g.assist !== 'Aucune') newAssists[g.assist] = (newAssists[g.assist] || 0) + 1;
        });

        db.collection('cloture').doc('matches').set({ data: matches });
        db.collection('cloture').doc('scorers').set({ data: newScorers });
        db.collection('cloture').doc('assists').set({ data: newAssists });
        alert('✅ Match J' + selectedJournee + ' enregistré !');
    }

    // === RESET ===
    function resetAll() {
        if (!confirm('⚠️ Réinitialiser TOUT ? Irréversible !')) return;
        db.collection('cloture').doc('matches').set({ data: [] });
        db.collection('cloture').doc('players').set({ data: [] });
        db.collection('cloture').doc('scorers').set({ data: {} });
        db.collection('cloture').doc('assists').set({ data: {} });
        goalsR = []; goalsB = [];
        selectedJournee = null;
        document.getElementById('matchForm').style.display = 'none';
        document.getElementById('matchSelect').value = '';
        alert('✅ Données réinitialisées !');
    }
</script>
</body>
</html>
